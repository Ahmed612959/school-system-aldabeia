<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
}

body {
    display: flex;
    background: #f4f6f9;
}

/* Sidebar */
.sidebar {
    width: 240px;
    background: #1e293b;
    color: white;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    padding: 10px;
    margin: 10px 0;
    color: #ccc;
    text-decoration: none;
    border-radius: 6px;
}

.sidebar a:hover {
    background: #334155;
    color: white;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

/* Header */
.header {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* Cards */
.cards {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.card {
    flex: 1;
    background: white;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

/* Search */
.search {
    margin-bottom: 15px;
}

.search input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Table */
.table-container {
    background: white;
    border-radius: 10px;
    padding: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #1e293b;
    color: white;
    padding: 10px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #eee;
}

input {
    width: 100%;
    padding: 5px;
}

/* Buttons */
button {
    border: none;
    padding: 6px 10px;
    border-radius: 5px;
    cursor: pointer;
}

.save {
    background: #22c55e;
    color: white;
}

.delete {
    background: #ef4444;
    color: white;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>📊 Dashboard</h2>
    <a href="#">👨‍🎓 الطلاب</a>
    <a href="#">📚 المواد</a>
    <a href="#">📈 النتائج</a>
</div>

<!-- Main -->
<div class="main">

    <div class="header">
        <h2>إدارة الطلاب</h2>
    </div>

    <!-- Cards -->
    <div class="cards">
        <div class="card">عدد الطلاب: <span id="totalStudents">0</span></div>
        <div class="card">عدد النتائج: —</div>
        <div class="card">عدد المخالفات: —</div>
    </div>

    <!-- Search -->
    <div class="search">
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن طالب..." oninput="filterStudents()">
    </div>

    <!-- Table -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>الاسم</th>
                    <th>Username</th>
                    <th>رقم الجلوس</th>
                    <th>الموبايل</th>
                    <th>ولي الأمر</th>
                    <th>تحكم</th>
                </tr>
            </thead>
            <tbody id="studentsTable"></tbody>
        </table>
    </div>

</div>

<script>

let allStudents = [];

// تحميل الطلاب
async function loadStudents() {
    const res = await fetch('/api/students');
    const students = await res.json();

    allStudents = students;

    document.getElementById('totalStudents').textContent = students.length;

    renderStudents(students);
}

// عرض الطلاب
function renderStudents(students) {
    const table = document.getElementById('studentsTable');
    table.innerHTML = '';

    students.forEach(s => {
        const row = `
        <tr>
            <td><input id="name-${s.id}" value="${s.fullName}"></td>
            <td>${s.username}</td>
            <td>${s.id}</td>
            <td><input id="phone-${s.id}" value="${s.profile?.phone || ''}"></td>
            <td><input id="parent-${s.id}" value="${s.profile?.parentName || ''}"></td>
            <td>
                <button class="save" onclick="updateStudent('${s.id}')">💾</button>
                <button class="delete" onclick="deleteStudent('${s.id}')">🗑</button>
            </td>
        </tr>
        `;
        table.innerHTML += row;
    });
}

// البحث
function filterStudents() {
    const value = document.getElementById('searchInput').value.toLowerCase();

    const filtered = allStudents.filter(s =>
        s.fullName.toLowerCase().includes(value) ||
        s.username.toLowerCase().includes(value) ||
        s.id.includes(value)
    );

    renderStudents(filtered);
}

// تعديل
async function updateStudent(id) {
    const fullName = document.getElementById(`name-${id}`).value;
    const phone = document.getElementById(`phone-${id}`).value;
    const parentName = document.getElementById(`parent-${id}`).value;

    await fetch('/api/students/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            fullName,
            profile: { phone, parentName }
        })
    });

    alert('تم التعديل');
}

// حذف
async function deleteStudent(id) {
    if (!confirm('متأكد؟')) return;

    await fetch('/api/students/' + id, {
        method: 'DELETE'
    });

    loadStudents();
}

// تشغيل
loadStudents();

</script>

</body>
</html>
