            margin: 0;
            padding: 0;
        }

        }

            background: #111111;
            padding: 1.5rem 1rem;

        }

        .logo-circle {

            border: 4px solid #d4af37;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.35);
        }

        .header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header h1 {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            color: #d4af37;
            font-weight: 700;
        }

        .container {
            max-width: 900px;
            margin: 3rem auto;
            padding: clamp(1.5rem, 4vw, 3rem);
            background: #141414;
            border-radius: 16px;
            border: 1px solid #3a3a3a;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.08);
        }

        .search-box {
            text-align: center;
            margin: 3rem 0;
        }

        .search-box label {
            font-size: clamp(1.1rem, 3.5vw, 1.35rem);
            font-weight: 600;
            color: #d4af37;
            display: block;
            margin-bottom: 1rem;
        }

        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: clamp(0.9rem, 2.5vw, 1.1rem) 1.3rem;
            font-size: clamp(1rem, 3vw, 1.2rem);
            background: #1e1e1e;
            color: #f0f0f0;
            border: 2px solid #444;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 5px rgba(212,175,55,0.15);
        }

        .search-box button {
            margin-top: 1.5rem;
            padding: clamp(0.9rem, 2.5vw, 1.1rem) 3rem;
            background: #d4af37;
            color: #0f0f0f;
            border: none;
            border-radius: 12px;
            font-size: clamp(1.05rem, 3vw, 1.25rem);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            background: #b8972e;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212,175,55,0.25);
        }

        #result-container {
            margin-top: 3rem;
            display: none;
        }

        .student-info {
            background: #1e1e1e;
            padding: 1.8rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            text-align: center;
            font-size: clamp(1.3rem, 4vw, 1.6rem);
            font-weight: 700;
            color: #d4af37;
            border: 1px solid #444;
        }

        .subject-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.6rem;
            margin: 1.2rem 0;
            transition: all 0.3s ease;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
            box-shadow: 0 10px 25px rgba(212,175,55,0.12);
        }

        .subject-title {
            font-size: clamp(1.15rem, 3.5vw, 1.35rem);
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 0.8rem;
        }

        .grade {
            font-size: clamp(1.4rem, 4.5vw, 1.7rem);
            font-weight: bold;
            color: #d4af37;
        }

        .no-result {
            color: #ff6b6b;
            font-size: 1.4rem;
            text-align: center;
            margin-top: 4rem;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem 0;
            color: #777;
            font-size: 0.95rem;
            border-top: 1px solid #333;
        }

        .footer span {
            color: #d4af37;
            font-weight: 600;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                margin: 2rem 1rem;
                padding: 2rem 1.5rem;
            }

            .header img {
                max-width: 140px;
            }

            .search-box input {

            }
        }

        @media (max-width: 480px) {
            h1 {

            }

            .search-box button {
                width: 100%;
                padding: 1rem;
            }

            .subject-card {
                padding: 1.2rem;
            }
        }
    </style>
</head>

async function searchFirstYearResult(){

const name=document.getElementById("student-name").value.trim();
const seat=document.getElementById("seat-number").value.trim();

const loading=document.getElementById('loading');
const resultContainer=document.getElementById('result-container');
const noResult=document.getElementById('no-result');
const subjectsList=document.getElementById('subjects-list');
const studentInfo=document.getElementById('student-info');

subjectsList.innerHTML="";
resultContainer.style.display="none";
noResult.style.display="none";
loading.style.display="block";

try{

const response=await fetch('/api/get-first-year-result',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({studentName:name,seatNumber:seat})
});

if(response.ok){

const data=await response.json();

if(data.success && data.results.length>0){

loading.style.display="none";
resultContainer.style.display="block";

studentInfo.textContent=`الطالب: ${data.results[0].studentName} - رقم الجلوس: ${data.results[0].seatNumber}`;

data.results.forEach(r=>{

const card=document.createElement("div");
card.className="subject-card";

card.innerHTML=`
<div class="subject-title">${r.subject}</div>
<div class="grade">${r.writtenGrade}</div>
`;

subjectsList.appendChild(card);

});

return;
}

}

}catch(e){}

loading.style.display="none";

const student=localResults.find(s=>s.seat===seat && s.name.includes(name));

if(student){

studentInfo.innerHTML=`الطالب: ${student.name} - رقم الجلوس: ${student.seat}`;

for(const subject in student.subjects){

const card=document.createElement("div");
card.className="subject-card";

card.innerHTML=`
<div class="subject-title">${subject}</div>
<div class="grade">${student.subjects[subject]}</div>
`;

subjectsList.appendChild(card);

}

const totalCard=document.createElement("div");
totalCard.className="subject-card";
totalCard.innerHTML=`<div class="subject-title">المجموع الكلي</div><div class="grade">${student.total}</div>`;
subjectsList.appendChild(totalCard);

const percentCard=document.createElement("div");
percentCard.className="subject-card";
percentCard.innerHTML=`<div class="subject-title">النسبة المئوية</div><div class="grade">${student.percent}</div>`;
subjectsList.appendChild(percentCard);

resultContainer.style.display="block";

}else{

noResult.style.display="block";

}

}
