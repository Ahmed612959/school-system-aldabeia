<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتائج طلاب الصف الأول الثانوي تمريض - معهد رعاية الضبعية</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            line-height: 1.6;
        }

        .header {
            background: #111111;
            padding: 1.5rem 1rem;
            text-align: center;
            border-bottom: 4px solid #d4af37;
        }

        .logo-circle {
            width: clamp(120px, 25vw, 180px);
            height: clamp(120px, 25vw, 180px);
            margin: 0 auto 0.8rem;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #d4af37;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.35);
        }

        .header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header h1 {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            color: #d4af37;
            font-weight: 700;
        }

        .container {
            max-width: 900px;
            margin: 3rem auto;
            padding: clamp(1.5rem, 4vw, 3rem);
            background: #141414;
            border-radius: 16px;
            border: 1px solid #3a3a3a;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.08);
        }

        .search-box {
            text-align: center;
            margin: 3rem 0;
        }

        .search-box label {
            font-size: clamp(1.1rem, 3.5vw, 1.35rem);
            font-weight: 600;
            color: #d4af37;
            display: block;
            margin-bottom: 1rem;
        }

        .search-box input {
            width: 100%;
            max-width: 500px;
            padding: clamp(0.9rem, 2.5vw, 1.1rem) 1.3rem;
            font-size: clamp(1rem, 3vw, 1.2rem);
            background: #1e1e1e;
            color: #f0f0f0;
            border: 2px solid #444;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 5px rgba(212,175,55,0.15);
        }

        .search-box button {
            margin-top: 1.5rem;
            padding: clamp(0.9rem, 2.5vw, 1.1rem) 3rem;
            background: #d4af37;
            color: #0f0f0f;
            border: none;
            border-radius: 12px;
            font-size: clamp(1.05rem, 3vw, 1.25rem);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            background: #b8972e;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(212,175,55,0.25);
        }

        #result-container {
            margin-top: 3rem;
            display: none;
        }

        .student-info {
            background: #1e1e1e;
            padding: 1.8rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            text-align: center;
            font-size: clamp(1.3rem, 4vw, 1.6rem);
            font-weight: 700;
            color: #d4af37;
            border: 1px solid #444;
        }

        .subject-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1.6rem;
            margin: 1.2rem 0;
            transition: all 0.3s ease;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            border-color: #d4af37;
            box-shadow: 0 10px 25px rgba(212,175,55,0.12);
        }

        .subject-title {
            font-size: clamp(1.15rem, 3.5vw, 1.35rem);
            font-weight: 600;
            color: #e0e0e0;
            margin-bottom: 0.8rem;
        }

        .grade {
            font-size: clamp(1.4rem, 4.5vw, 1.7rem);
            font-weight: bold;
            color: #d4af37;
        }

        .no-result {
            color: #ff6b6b;
            font-size: 1.4rem;
            text-align: center;
            margin-top: 4rem;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem 0;
            color: #777;
            font-size: 0.95rem;
            border-top: 1px solid #333;
        }

        .footer span {
            color: #d4af37;
            font-weight: 600;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                margin: 2rem 1rem;
                padding: 2rem 1.5rem;
            }

            .header img {
                max-width: 140px;
            }

            .search-box input {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .search-box button {
                width: 100%;
                padding: 1rem;
            }

            .subject-card {
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <img src="logo.png" alt="شعار معهد رعاية الضبعية">
    <h1>استعلام عن نتيجة الصف الأول الثانوي تمريض</h1>
</div>

<div class="container">
    <div class="search-box">
        <label for="student-name">أدخل اسمك الكامل</label>
        <input type="text" id="student-name" placeholder="مثال: أحمد محمد علي" autocomplete="off">
        
        <label for="seat-number">أدخل رقم الجلوس</label>
        <input type="text" id="seat-number" placeholder="مثال: 541" autocomplete="off">
        
        <button onclick="searchFirstYearResult()">عرض النتيجة</button>
    </div>

    <div id="loading" style="text-align: center; color: #d4af37; font-size: 1.3rem; margin: 2.5rem 0; display: none;">جاري البحث عن نتيجتك...</div>

    <div id="result-container">
        <div id="student-info" class="student-info"></div>
        
        <div id="subjects-list"></div>
    </div>

    <p id="no-result" class="no-result">
        لا توجد نتيجة مسجلة بهذا الاسم ورقم الجلوس
    </p>
</div>

<div class="footer">
    Developed by <span>Ahmed Moussa</span> ♥
</div>

<script>
    async function searchFirstYearResult() {
        const name = document.getElementById('student-name').value.trim();
        const seat = document.getElementById('seat-number').value.trim();

        if (!name || !seat) {
            alert('من فضلك أدخل الاسم ورقم الجلوس');
            return;
        }

        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('result-container');
        const noResult = document.getElementById('no-result');
        const subjectsList = document.getElementById('subjects-list');
        const studentInfo = document.getElementById('student-info');

        resultContainer.style.display = 'none';
        noResult.style.display = 'none';
        subjectsList.innerHTML = '';
        studentInfo.textContent = '';
        loading.style.display = 'block';

        try {
            const response = await fetch('/api/get-first-year-result', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ studentName: name, seatNumber: seat })
            });

            const data = await response.json();

            loading.style.display = 'none';

            if (data.success && data.results.length > 0) {
                resultContainer.style.display = 'block';
                studentInfo.textContent = `الطالب: ${data.results[0].studentName} - رقم الجلوس: ${data.results[0].seatNumber}`;

                data.results.forEach(r => {
                    const card = document.createElement('div');
                    card.className = 'subject-card';
                    card.innerHTML = `
                        <div class="subject-title">${r.subject}</div>
                        <div class="grade">الدرجة: ${r.writtenGrade}</div>
                    `;
                    subjectsList.appendChild(card);
                });
            } else {
                noResult.style.display = 'block';
            }
        } catch (err) {
            loading.style.display = 'none';
            alert('حدث خطأ أثناء البحث، حاول مرة أخرى');
            console.error(err);
        }
    }
</script>

</body>
</html>
