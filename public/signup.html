<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل طالب</title>
</head>

<body>

<form id="signup-form">

<input id="fullName" placeholder="اسم الطالب" required><br>
<input id="username" placeholder="اسم المستخدم" required><br>
<input id="password" type="password" placeholder="كلمة المرور" required><br>
<input id="phone" placeholder="رقم الهاتف" required><br>
<input id="parentName" placeholder="اسم ولي الأمر" required><br>
<input id="parentId" placeholder="رقم البطاقة" required><br>

<select id="year" required>
<option value="">اختر الصف</option>
<option value="first">أولى</option>
<option value="second">ثانية</option>
<option value="third">ثالثة</option>
</select>

<br><br>

<button type="submit">تسجيل</button>

</form>

<script src="signup.js"></script>

</body>
</html>
