<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 300px;
}
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}
button {
    width: 100%;
    padding: 10px;
    background: #22c55e;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <h3>إنشاء حساب</h3>

    <input id="fullName" placeholder="الاسم">
    <input id="username" placeholder="اسم المستخدم">
    <input id="password" type="password" placeholder="كلمة المرور">
    <input id="studentCode" placeholder="7 أرقام">
    <input id="phone" placeholder="رقم الهاتف">
    <input id="parentName" placeholder="ولي الأمر">
    <input id="parentId" placeholder="14 رقم">

    <button onclick="register()">تسجيل</button>
</div>

<script>
async function register() {
    const data = {
        fullName: fullName.value,
        username: username.value,
        password: password.value,
        studentCode: studentCode.value,
        phone: phone.value,
        parentName: parentName.value,
        parentId: parentId.value
    };

    const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if (!res.ok) {
        alert(result.error);
    } else {
        alert("تم التسجيل بنجاح");
    }
}
</script>

</body>
</html>
