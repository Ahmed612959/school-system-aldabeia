<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب</title>
<style>
body {
  font-family: Arial;
  background: #f4f7fb;
}
.box {
  width: 300px;
  margin: 80px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
input, button {
  width: 100%;
  margin: 8px 0;
  padding: 10px;
}
button {
  background: #3498db;
  color: white;
  border: none;
}
</style>
</head>
<body>

<div class="box">
  <h3>إنشاء حساب</h3>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <input id="studentCode" placeholder="7 أرقام">

  <button onclick="register()">تسجيل</button>

  <p id="msg"></p>
</div>

<script src="signup.js"></script>
</body>
</html>
