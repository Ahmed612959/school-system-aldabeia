<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إنشاء حساب</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(20px);}
      to {opacity:1; transform: translateY(0);}
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #2a5298;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2a5298;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
    }

    button:hover {
      background: #1e3c72;
    }

    .message {
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }

    .error {
      color: red;
    }

    .success {
      color: green;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>إنشاء حساب طالب</h2>

  <input type="text" id="fullName" placeholder="الاسم بالكامل">
  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="text" id="id" placeholder="رقم الجلوس">
  <input type="text" id="phone" placeholder="رقم الهاتف">
  <input type="text" id="parentName" placeholder="اسم ولي الأمر">
  <input type="text" id="parentId" placeholder="رقم بطاقة ولي الأمر">
  <input type="password" id="password" placeholder="كلمة المرور">

  <button onclick="register()" id="btn">إنشاء حساب</button>

  <div class="message" id="msg"></div>
</div>

<script>
async function register() {
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');

  const data = {
    fullName: document.getElementById('fullName').value.trim(),
    username: document.getElementById('username').value.trim(),
    id: document.getElementById('id').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    parentName: document.getElementById('parentName').value.trim(),
    parentId: document.getElementById('parentId').value.trim(),
    password: document.getElementById('password').value.trim()
  };

  // Validation
  if (Object.values(data).some(v => v === "")) {
    return showMsg("كل الحقول مطلوبة", "error");
  }

  if (!/^\d{1,7}$/.test(data.id)) {
    return showMsg("رقم الجلوس غير صحيح", "error");
  }

  if (!/^\d{14}$/.test(data.parentId)) {
    return showMsg("رقم بطاقة ولي الأمر لازم 14 رقم", "error");
  }

  if (!/^[a-zA-Z0-9]{3,20}$/.test(data.username)) {
    return showMsg("اسم المستخدم 3-20 حرف (أرقام/حروف فقط)", "error");
  }

  try {
    btn.classList.add("loading");
    btn.innerText = "جاري الإنشاء...";

    const res = await fetch("https://schoolx-five.vercel.app/api/register-student", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (res.ok) {
      showMsg("✅ تم إنشاء الحساب بنجاح", "success");
      clearForm();
    } else {
      showMsg(result.error || "حدث خطأ", "error");
    }

  } catch (err) {
    showMsg("السيرفر مش شغال 😅", "error");
  }

  btn.classList.remove("loading");
  btn.innerText = "إنشاء حساب";
}

function showMsg(text, type) {
  const msg = document.getElementById('msg');
  msg.innerText = text;
  msg.className = "message " + type;
}

function clearForm() {
  document.querySelectorAll("input").forEach(input => input.value = "");
}
</script>

</body>
</html>
